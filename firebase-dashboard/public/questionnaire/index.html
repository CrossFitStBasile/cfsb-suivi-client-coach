<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f3f6f8">
  <meta name="robots" content="noindex,nofollow">
  <title>Questionnaire en sécurisation | CFSB</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f6f8;
      color: #17212b;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(160deg, #f8fafb 0%, #e9f0f4 100%);
    }
    main {
      width: min(100%, 620px);
      padding: clamp(28px, 7vw, 52px);
      border: 1px solid #d7e0e6;
      border-radius: 24px;
      background: #fff;
      box-shadow: 0 18px 50px rgba(23, 33, 43, 0.09);
    }
    .eyebrow {
      margin: 0 0 12px;
      color: #167b78;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.9rem, 6vw, 2.8rem);
      line-height: 1.08;
    }
    p {
      margin: 20px 0 0;
      color: #53616d;
      font-size: 1.04rem;
      line-height: 1.65;
    }
    .status {
      display: inline-flex;
      margin-top: 26px;
      padding: 9px 13px;
      border-radius: 999px;
      background: #fff5dc;
      color: #795700;
      font-size: 0.86rem;
      font-weight: 750;
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">CrossFit St-Basile</p>
    <h1>Questionnaire en sécurisation</h1>
    <p>Ce lien n’est pas disponible pour le moment. Demande à ton entraîneur de te transmettre le nouveau lien sécurisé lorsqu’il sera activé.</p>
    <span class="status">Aucune réponse ne peut être envoyée depuis cette page</span>
  </main>
</body>
</html>
