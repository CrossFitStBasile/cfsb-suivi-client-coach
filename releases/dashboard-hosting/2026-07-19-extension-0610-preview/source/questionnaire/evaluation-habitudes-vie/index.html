<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f3f6f8">
  <meta name="description" content="Évaluation des habitudes de vie CFSB">
  <title>Évaluation habitudes de vie | CFSB</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/questionnaire/questionnaire-form.css">
</head>
<body data-questionnaire-type="evaluation_habitudes_vie">
  <main class="form-shell">
    <header class="form-header">
      <p class="eyebrow">CrossFit St-Basile</p>
      <h1 id="questionnaireTitle">Évaluation habitudes de vie</h1>
      <p class="intro" id="questionnaireIntro"></p>
    </header>

    <div class="progress-wrap" aria-live="polite">
      <div class="progress-meta">
        <span id="progressText">Étape 1</span>
        <span id="stepName"></span>
      </div>
      <div class="progress-track" aria-hidden="true">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>

    <form class="questionnaire-form" id="questionnaireForm" novalidate>
      <div id="steps"></div>
      <div class="form-error" id="formError" role="alert"></div>
      <div class="form-success" id="formSuccess" role="status"></div>
    </form>
  </main>

  <footer class="form-actions">
    <div class="form-actions-inner">
      <button class="button button-secondary" id="previousButton" type="button">Retour</button>
      <button class="button button-primary" id="nextButton" type="button">Continuer</button>
      <button class="button button-primary" id="submitButton" type="submit" form="questionnaireForm" hidden>Envoyer mes réponses</button>
    </div>
  </footer>

  <script type="module" src="/questionnaire/questionnaire-form.js"></script>
</body>
</html>
