name: Refresh dashboard snapshots

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Refresh dashboard JSON snapshots
        run: node dashboard/scripts/refresh-dashboard-snapshots.mjs
      - name: Commit snapshot updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard/data
          git diff --cached --quiet || git commit -m "Refresh dashboard snapshots"
          git push
