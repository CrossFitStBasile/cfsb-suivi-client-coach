steps:
  - name: node:22
    id: source-contract
    entrypoint: bash
    args:
      - -ceu
      - |
        node --check firebase-dashboard/public/app.js
        node --check functions/index.js
        node tools/verify-google-only-readiness.cjs

  - name: node:22
    id: functions-contract
    entrypoint: bash
    args:
      - -ceu
      - |
        npm --prefix functions ci --ignore-scripts
        npm --prefix functions run lint

  - name: node:22
    id: hosting-preview
    entrypoint: bash
    env:
      - CI=true
    args:
      - -ceu
      - |
        npx --yes firebase-tools@15.19.1 hosting:channel:deploy google-only \
          --project cfsb-dashboard-coach-aa9a4 \
          --expires 1h \
          --non-interactive

serviceAccount: projects/cfsb-dashboard-coach-aa9a4/serviceAccounts/dashboard-deployer@cfsb-dashboard-coach-aa9a4.iam.gserviceaccount.com

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1200s
